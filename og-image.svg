<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="577" cy="430" r="78" fill="#16213e" opacity="0.13"/>
    <circle cx="1284" cy="388" r="88" fill="#16213e" opacity="0.08"/>
    <circle cx="101" cy="694" r="91" fill="#16213e" opacity="0.06"/>
    <circle cx="586" cy="252" r="62" fill="#16213e" opacity="0.06"/>
    <circle cx="114" cy="-16" r="83" fill="#16213e" opacity="0.06"/>
    <circle cx="1165" cy="619" r="93" fill="#16213e" opacity="0.14"/>
    <rect x="-6" y="427" width="31" height="55" rx="8" fill="#1a1a2e" opacity="0.14" transform="rotate(27, 786, 647)"/>
    <rect x="965" y="450" width="26" height="90" rx="8" fill="#1a1a2e" opacity="0.05" transform="rotate(13, 309, 649)"/>
    <rect x="537" y="210" width="26" height="45" rx="8" fill="#1a1a2e" opacity="0.11" transform="rotate(41, 294, 549)"/>
    <rect x="1275" y="-97" width="37" height="58" rx="8" fill="#1a1a2e" opacity="0.13" transform="rotate(40, 682, 172)"/>
    <rect x="539" y="639" width="79" height="48" rx="8" fill="#1a1a2e" opacity="0.09" transform="rotate(0, 1110, 463)"/>
    <rect x="1062" y="-5" width="89" height="92" rx="8" fill="#1a1a2e" opacity="0.10" transform="rotate(18, 493, 597)"/>
    <rect x="82" y="724" width="64" height="39" rx="8" fill="#1a1a2e" opacity="0.15" transform="rotate(26, 503, 359)"/>
    <rect x="0" y="-35" width="78" height="69" rx="8" fill="#1a1a2e" opacity="0.13" transform="rotate(17, 1259, 213)"/>
    <polygon points="328,423 353,473 303,473" fill="#16213e" opacity="0.07"/>
    <polygon points="1098,404 1179,566 1017,566" fill="#16213e" opacity="0.12"/>
    <polygon points="411,491 496,661 326,661" fill="#16213e" opacity="0.13"/>
    <polygon points="1075,349 1172,543 978,543" fill="#16213e" opacity="0.13"/>

  <!-- Wave at bottom -->
  <path d="M0,582 C360,606 840,558 1200,582 L1200,630 L0,630Z" fill="#16213e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Daegu tower 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Daegu — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#e94560" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#e94560" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Daegu Daegu tower 안내 — 정보
  </text>
</svg>